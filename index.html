<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Street Racer 3D</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  background:#000;min-height:100vh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-family:'Space Mono',monospace;color:#fff;
  overflow:hidden;user-select:none;touch-action:none;
}
#wrap{position:relative;width:100%;max-width:420px}
canvas{display:block;width:100%;height:auto}
#car-select{
  position:absolute;inset:0;background:rgba(0,0,0,.97);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:16px;padding:18px;z-index:20;transition:opacity .3s;
}
#car-select.gone{opacity:0;pointer-events:none}
#cs-title{font-size:1.3rem;font-weight:700;letter-spacing:.2em}
#cs-sub{font-size:.52rem;letter-spacing:.12em;color:rgba(255,255,255,.25);text-transform:uppercase}
#cs-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;width:100%}
.cs-card{
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);
  border-radius:10px;padding:8px 6px;cursor:pointer;text-align:center;
  transition:border-color .15s,background .15s,transform .1s;position:relative;
}
.cs-card:hover{background:rgba(255,255,255,.07);transform:translateY(-2px)}
.cs-card.selected{border-color:var(--ac,#00e5ff);background:rgba(0,229,255,.05);box-shadow:0 0 14px color-mix(in srgb,var(--ac,#00e5ff) 20%,transparent)}
.cs-canvas{display:block;margin:0 auto}
.cs-name{font-size:.52rem;font-weight:700;letter-spacing:.08em;margin-top:5px}
.cs-desc{font-size:.4rem;letter-spacing:.05em;color:rgba(255,255,255,.25);margin-top:2px}
.cs-badge{position:absolute;top:4px;right:4px;font-size:.36rem;letter-spacing:.07em;padding:2px 4px;border-radius:3px;font-weight:700}
.cs-bars{margin-top:5px;display:flex;flex-direction:column;gap:2px}
.cs-bar-row{display:flex;align-items:center;gap:3px}
.cs-bar-lbl{font-size:.36rem;color:rgba(255,255,255,.2);width:12px;text-transform:uppercase}
.cs-bar-track{flex:1;height:2px;background:rgba(255,255,255,.07);border-radius:1px;overflow:hidden}
.cs-bar-fill{height:100%;border-radius:1px}
#cs-go{padding:12px 36px;border-radius:8px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.05);color:#fff;font-family:'Space Mono',monospace;font-size:.8rem;font-weight:700;letter-spacing:.1em;cursor:pointer;transition:all .15s;width:100%}
#cs-go:hover{border-color:rgba(0,229,255,.5);color:#00e5ff;box-shadow:0 0 18px rgba(0,229,255,.2)}
#hud{position:absolute;top:0;left:0;right:0;display:flex;justify-content:space-between;padding:10px 14px;pointer-events:none}
.hud-l,.hud-r{display:flex;flex-direction:column;gap:3px}
.hv{font-size:clamp(1rem,4vw,1.4rem);font-weight:700;letter-spacing:.04em;line-height:1}
.hl{font-size:.43rem;letter-spacing:.14em;color:rgba(255,255,255,.28);text-transform:uppercase}
#hv-spd{color:#fff}
#hv-sc{color:#00e5ff;text-shadow:0 0 10px rgba(0,229,255,.5)}
#hv-lv{color:#ff9500}
#hv-bs{color:#ff9500;font-size:clamp(.75rem,3vw,.95rem)}
#gear-box{position:absolute;bottom:122px;right:14px;text-align:center;pointer-events:none}
#gear-n{font-size:2rem;font-weight:700;line-height:1}
#gear-l{font-size:.4rem;letter-spacing:.14em;color:rgba(255,255,255,.22)}
#hearts{position:absolute;bottom:118px;left:14px;display:flex;gap:4px;pointer-events:none}
.heart{font-size:.95rem;transition:all .2s}.heart.empty{opacity:.15;filter:grayscale(1)}
#gauges{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.9);border-top:1px solid rgba(255,255,255,.05);padding:7px 14px 9px;display:flex;flex-direction:column;gap:4px}
.gr{display:flex;align-items:center;gap:7px}
.gl{font-size:.4rem;letter-spacing:.11em;color:rgba(255,255,255,.22);width:24px;text-transform:uppercase}
.gt{flex:1;height:3px;background:rgba(255,255,255,.07);border-radius:2px;overflow:hidden}
.gf{height:100%;border-radius:2px;transition:width .12s}
#gf-r{background:linear-gradient(90deg,#00e5ff,#ff3c3c)}
#gf-n{background:#bf5fff}
#gf-h{background:#44ff88}
.gn{font-size:.43rem;width:26px;text-align:right;color:rgba(255,255,255,.28)}
#controls{display:flex;gap:8px;padding:0 14px 7px;width:100%;max-width:420px}
.cb{flex:1;padding:15px 0;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:10px;color:rgba(255,255,255,.32);font-size:1.2rem;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:background .08s,color .08s}
.cb:active,.cb.p{background:rgba(255,255,255,.1);color:#fff}
#nb{flex:.6;font-family:'Space Mono',monospace;font-size:.56rem;font-weight:700;letter-spacing:.07em;color:rgba(191,95,255,.32);border-color:rgba(191,95,255,.1)}
#nb.on{color:#bf5fff;border-color:#bf5fff44;text-shadow:0 0 10px rgba(191,95,255,.5)}
#stats{display:flex;justify-content:space-between;padding:4px 14px 0;width:100%;max-width:420px;font-size:.46rem;letter-spacing:.07em;color:rgba(255,255,255,.16)}
#stats span{color:rgba(255,255,255,.32)}
#overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;background:rgba(0,0,0,.88);backdrop-filter:blur(10px);border-radius:4px;transition:opacity .3s}
#overlay.gone{opacity:0;pointer-events:none}
#ov-t{font-size:clamp(1.2rem,5vw,1.8rem);font-weight:700;letter-spacing:.18em}
#ov-s{font-size:.58rem;color:rgba(255,255,255,.28);text-align:center;line-height:1.9;letter-spacing:.05em}
#ov-sr{display:flex;gap:18px;font-size:.6rem}
.os{color:rgba(255,255,255,.28)}.os span{color:#00e5ff}
#ov-sr.h{display:none}
#ov-b{padding:11px 32px;border-radius:8px;border:1px solid rgba(255,255,255,.13);background:rgba(255,255,255,.05);color:#fff;font-family:'Space Mono',monospace;font-size:.78rem;font-weight:700;letter-spacing:.1em;cursor:pointer;transition:all .15s}
#ov-b:hover{border-color:rgba(0,229,255,.5);color:#00e5ff}
#ch-car{font-size:.5rem;letter-spacing:.1em;color:rgba(255,255,255,.18);background:none;border:none;cursor:pointer;font-family:'Space Mono',monospace;padding:3px;transition:color .15s}
#ch-car:hover{color:rgba(255,255,255,.45)}
#hw{width:100%;max-width:420px;padding:5px 14px 0}
#hh{display:flex;justify-content:space-between;margin-bottom:5px}
.htitle{font-size:.46rem;letter-spacing:.11em;text-transform:uppercase;color:rgba(255,255,255,.14)}
#hclr{font-size:.44rem;color:rgba(255,255,255,.14);background:none;border:none;cursor:pointer;font-family:'Space Mono',monospace}
#hclr:hover{color:rgba(255,255,255,.4)}
#hl{display:flex;flex-direction:column;gap:4px;max-height:88px;overflow-y:auto;scrollbar-width:none}
#hl::-webkit-scrollbar{display:none}
.hr{display:grid;grid-template-columns:auto 1fr auto auto;gap:9px;align-items:center;background:rgba(255,255,255,.022);border:1px solid rgba(255,255,255,.05);border-radius:6px;padding:5px 9px;font-size:.48rem;animation:fi .2s ease}
@keyframes fi{from{opacity:0;transform:translateY(-3px)}to{opacity:1;transform:none}}
.hsc{font-weight:700;color:#00e5ff;min-width:34px}
.hinfo{color:rgba(255,255,255,.26)}
.hlv{font-size:.4rem;color:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.06);border-radius:3px;padding:1px 5px}
.ht{color:rgba(255,255,255,.13);font-size:.4rem;text-align:right}
.hemp{text-align:center;font-size:.48rem;color:rgba(255,255,255,.13);padding:10px 0}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c" width="420" height="560"></canvas>
  <div id="car-select">
    <div id="cs-title">SELECT YOUR CAR</div>
    <div id="cs-sub">Choose your ride · stats affect gameplay</div>
    <div id="cs-grid"></div>
    <button id="cs-go">START ENGINE ▶</button>
  </div>
  <div id="hud">
    <div class="hud-l">
      <div class="hl">Speed</div>
      <div class="hv" id="hv-spd">0 <span style="font-size:.55em;opacity:.35">km/h</span></div>
      <div class="hl" style="margin-top:4px">Score</div>
      <div class="hv" id="hv-sc">0</div>
    </div>
    <div class="hud-r" style="text-align:right">
      <div class="hl">Level</div>
      <div class="hv" id="hv-lv">1</div>
      <div class="hl" style="margin-top:4px">Best</div>
      <div class="hv" id="hv-bs">0</div>
    </div>
  </div>
  <div id="gear-box"><div id="gear-n">1</div><div id="gear-l">GEAR</div></div>
  <div id="hearts"><span class="heart" id="h1">❤️</span><span class="heart" id="h2">❤️</span><span class="heart" id="h3">❤️</span></div>
  <div id="gauges">
    <div class="gr"><div class="gl">RPM</div><div class="gt"><div class="gf" id="gf-r" style="width:0%"></div></div><div class="gn" id="gn-r">0%</div></div>
    <div class="gr"><div class="gl">NOS</div><div class="gt"><div class="gf" id="gf-n" style="width:0%"></div></div><div class="gn" id="gn-n">0%</div></div>
    <div class="gr"><div class="gl">HP</div><div class="gt"><div class="gf" id="gf-h" style="width:100%"></div></div><div class="gn" id="gn-h">3/3</div></div>
  </div>
  <div id="overlay" class="gone">
    <div id="ov-t">CRASHED</div>
    <div id="ov-s">Engine still warm.</div>
    <div id="ov-sr" class="h">
      <div class="os">SCORE <span id="fin-sc">0</span></div>
      <div class="os">SPEED <span id="fin-sp">0</span></div>
      <div class="os">TIME <span id="fin-t">0s</span></div>
    </div>
    <button id="ov-b">RESTART</button>
    <button id="ch-car">CHANGE CAR</button>
  </div>
</div>
<div id="controls">
  <button class="cb" id="bl">◀</button>
  <button class="cb" id="nb">NOS</button>
  <button class="cb" id="br">▶</button>
</div>
<div id="stats">
  <div>CRASHES <span id="st-cr">0</span></div>
  <div>BEST TIME <span id="st-bt">0s</span></div>
  <div>RUNS <span id="st-r">0</span></div>
</div>
<div id="hw">
  <div id="hh"><div class="htitle">High Score History</div><button id="hclr">Clear</button></div>
  <div id="hl"><div class="hemp">No runs yet</div></div>
</div>

<script>
(() => {
  const W=420, H=560;
  const c=document.getElementById('c');
  const ctx=c.getContext('2d');

  // ── CARS ──────────────────────────────────────────────────
  const CARS=[
    {id:'sport',  name:'SPORT',  badge:'FAST',  bc:'#0066cc', ac:'#00e5ff', body:'#0044cc', roof:'#003399', glass:'rgba(140,210,255,.42)', type:'sport',  stats:{spd:8,hdl:8,nos:7},  desc:'Speed 8 · Handling 8'},
    {id:'muscle', name:'MUSCLE', badge:'STOCK', bc:'#555',    ac:'#ff3c3c', body:'#cc2200', roof:'#991800', glass:'rgba(100,180,255,.38)', type:'muscle', stats:{spd:7,hdl:5,nos:6},  desc:'Speed 7 · Handling 5'},
    {id:'super',  name:'HYPER',  badge:'🔥HOT', bc:'#cc5500', ac:'#ff9500', body:'#cc5500', roof:'#994000', glass:'rgba(255,200,80,.32)',  type:'super',  stats:{spd:10,hdl:7,nos:8}, desc:'Speed 10 · NOS 8'},
    {id:'suv',    name:'SUV',    badge:'TOUGH', bc:'#336600', ac:'#44ff88', body:'#224400', roof:'#1a3300', glass:'rgba(120,200,140,.32)', type:'suv',    stats:{spd:5,hdl:4,nos:9},  desc:'Speed 5 · NOS 9'},
    {id:'classic',name:'CLASSIC',badge:'RETRO', bc:'#886600', ac:'#ffdd00', body:'#886600', roof:'#664d00', glass:'rgba(200,210,80,.32)',  type:'classic',stats:{spd:6,hdl:6,nos:5},  desc:'Speed 6 · Balanced'},
    {id:'stealth',name:'STEALTH',badge:'RARE',  bc:'#660099', ac:'#bf5fff', body:'#220044', roof:'#160033', glass:'rgba(160,80,255,.28)',  type:'stealth',stats:{spd:9,hdl:9,nos:10}, desc:'Speed 9 · NOS 10'},
  ];

  let selectedCar=CARS[0];

  // ── PERSIST ───────────────────────────────────────────────
  let pd={best:0,crashes:0,btime:0,runs:0,history:[],lastCar:'sport'};
  try{Object.assign(pd,JSON.parse(localStorage.getItem('sr3d_v3')||'{}'));}catch(e){}
  function save(){localStorage.setItem('sr3d_v3',JSON.stringify(pd));}
  selectedCar=CARS.find(x=>x.id===pd.lastCar)||CARS[0];

  // ── ROAD CONFIG ───────────────────────────────────────────
  const DEPTH=0.84, ROAD_W=2200, SEG=200, SEGS=600, LANES=4;
  const LANE_W=ROAD_W/LANES;
  // Pre-build road geometry (fixed, camera moves through it)
  const road=[];
  for(let i=0;i<SEGS;i++){
    road.push({
      y: Math.sin(i/20)*55 + Math.sin(i/11)*18,
      curve: Math.sin(i/28)*.3 + Math.sin(i/15)*.1,
      alt: Math.floor(i/2)%2,
      cars:[], pickups:[]
    });
  }

  // Project a world-z point to screen
  function project(worldZ, worldY, camZ, camY, camX){
    const dz = worldZ - camZ;
    if(dz <= 0) return null;
    const scale = DEPTH / dz;
    const sx = (W/2) + scale * (-camX) * W/2;
    const sy = (H/2) - scale * (worldY - camY) * H/2;
    const sw = scale * ROAD_W * W/2;
    return {sx, sy, sw, scale};
  }

  // ── GAME STATE ────────────────────────────────────────────
  let camZ=0, camY=150, camX=0;
  let spd=0, maxSpd=160, playerLane=1, playerX=0, playerTargetX=0;
  let hp=3, nos=0, nosOn=false, nosTimer=0;
  let score=0, level=1, elapsed=0, startTime=0, gear=1;
  let running=false, dead=false, lastT=0;
  let flashAlpha=0, sparks=[], steerAnim=0;

  function laneX(l){ return -ROAD_W/2 + l*LANE_W + LANE_W/2; }

  function initGame(){
    // clear old traffic/pickups
    road.forEach(r=>{ r.cars=[]; r.pickups=[]; });
    camZ=0; camY=150; camX=0;
    spd=0; maxSpd=100 + selectedCar.stats.spd*10;
    playerLane=1; playerX=0; playerTargetX=laneX(1);
    hp=3; nos=0; nosOn=false; nosTimer=0;
    score=0; level=1; elapsed=0; gear=1;
    steerAnim=0; flashAlpha=0; sparks=[]; dead=false;
    startTime=Date.now();
    pd.lastCar=selectedCar.id; save();
  }

  // ── DRAW HELPERS ──────────────────────────────────────────
  function dk(hex,a){ const r=parseInt(hex.slice(1,3),16)||0,g=parseInt(hex.slice(3,5),16)||0,b=parseInt(hex.slice(5,7),16)||0; return `rgb(${~~(r*(1-a))},${~~(g*(1-a))},${~~(b*(1-a))})`; }
  function lt(hex,a){ const r=parseInt(hex.slice(1,3),16)||0,g=parseInt(hex.slice(3,5),16)||0,b=parseInt(hex.slice(5,7),16)||0; return `rgb(${Math.min(255,~~(r*(1+a)))},${Math.min(255,~~(g*(1+a)))},${Math.min(255,~~(b*(1+a)))})`; }
  function rr(x,y,w,h,r){
    ctx.beginPath();
    ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
    ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
    ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
    ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);
    ctx.closePath();
  }
  function trap(x1,y1,x2,y2,w1,w2){
    w2=w2!==undefined?w2:w1;
    ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x1+w1,y1);ctx.lineTo(x2+w2,y2);ctx.lineTo(x2,y2);ctx.closePath();ctx.fill();
  }

  // ── DRAW ROAD STRIP ───────────────────────────────────────
  function drawStrip(x1,y1,w1,x2,y2,w2,alt){
    const rb=~~(w1/5);
    // Grass
    ctx.fillStyle=alt?'#0c160c':'#0a120a';
    ctx.fillRect(0,y2,W,y1-y2);
    // Rumble
    ctx.fillStyle=alt?'#ddd':'#cc2200';
    trap(x1-w1-rb,y1,x2-w2-rb,y2,rb*2);
    trap(x1+w1,y1,x2+w2,y2,rb*2);
    // Road
    ctx.fillStyle=alt?'#1a1a1a':'#1c1c1c';
    trap(x1-w1,y1,x2-w2,y2,w1*2,w2*2);
    // Lane lines
    if(!alt){
      ctx.fillStyle='rgba(255,255,255,.6)';
      for(let l=1;l<LANES;l++){
        if(l===2)continue;
        trap(x1-w1+l*(w1*2/LANES)-1,y1,x2-w2+l*(w2*2/LANES)-1,y2,2);
      }
      ctx.fillStyle='rgba(255,200,0,.6)';
      trap(x1-2,y1,x2-2,y2,2); trap(x1+1,y1,x2+1,y2,2);
    }
  }

  // ── DRAW CAR (reusable for player + traffic + preview) ────
  function drawCar(dc, sx, sy, scale, car, isPlayer, lean, active_nos){
    const t=car.type;
    const DIM={
      sport:  {w:64,h:102,rh:.32,rw:.5, low:2},
      muscle: {w:70,h:108,rh:.38,rw:.55,low:0},
      super:  {w:74,h:106,rh:.27,rw:.48,low:4},
      suv:    {w:72,h:116,rh:.44,rw:.64,low:0},
      classic:{w:68,h:110,rh:.4, rw:.6, low:0},
      stealth:{w:72,h:104,rh:.29,rw:.52,low:5},
    }[t]||{w:66,h:105,rh:.33,rw:.52,low:0};

    const W2=~~(DIM.w*scale), H2=~~(DIM.h*scale);
    if(W2<4||H2<4)return;
    const x=sx-W2/2, y=sy-H2+DIM.low*scale;
    const sk=lean*W2*.055;

    // Shadow
    dc.fillStyle='rgba(0,0,0,.35)';
    dc.beginPath();dc.ellipse(sx,sy+DIM.low*scale,W2*.5,H2*.05,0,0,Math.PI*2);dc.fill();

    // Undercarriage
    dc.fillStyle=dk(car.body,.7);
    dc.beginPath();rr.call({ctx:dc},x+W2*.06,y+H2*.88,W2*.88,H2*.12,W2*.04);
    // (rr uses global ctx — let's use a closure)
    _rr(dc,x+W2*.06+sk*.4,y+H2*.88,W2*.88,H2*.12,W2*.04);dc.fill();

    // Body
    const bg=dc.createLinearGradient(x,y,x+W2,y+H2);
    bg.addColorStop(0,dk(car.body,.4));
    bg.addColorStop(.2,car.body);
    bg.addColorStop(.5,lt(car.body,.14));
    bg.addColorStop(.8,car.body);
    bg.addColorStop(1,dk(car.body,.4));
    dc.fillStyle=bg;

    if(t==='suv'){
      dc.beginPath();
      dc.moveTo(x+W2*.02+sk,y+H2*.11); dc.lineTo(x+W2*.98+sk,y+H2*.11);
      dc.lineTo(x+W2-sk,y+H2*.88); dc.lineTo(x-sk,y+H2*.88);
      dc.closePath();dc.fill();
    } else if(t==='super'||t==='stealth'){
      dc.beginPath();
      dc.moveTo(x+W2*.04+sk,y+H2*.17); dc.lineTo(x+W2*.96+sk,y+H2*.17);
      dc.lineTo(x+W2-sk,y+H2*.9); dc.lineTo(x-sk,y+H2*.9);
      dc.closePath();dc.fill();
    } else {
      dc.beginPath();
      dc.moveTo(x+W2*.06+sk,y+H2*.2);
      dc.quadraticCurveTo(x+W2*.16+sk,y+H2*.12,x+W2*.3+sk,y+H2*.12);
      dc.lineTo(x+W2*.7+sk,y+H2*.12);
      dc.quadraticCurveTo(x+W2*.84+sk,y+H2*.12,x+W2*.94+sk,y+H2*.2);
      dc.lineTo(x+W2-sk,y+H2*.87); dc.lineTo(x-sk,y+H2*.87);
      dc.closePath();dc.fill();
    }

    // Roof
    dc.fillStyle=car.roof;
    const rpad=(1-DIM.rw)/2;
    _rr(dc,x+W2*(rpad+.02)+sk,y+H2*.11,W2*(DIM.rw-.04),H2*DIM.rh,W2*.04);dc.fill();

    // Windshield
    dc.fillStyle=car.glass;
    _rr(dc,x+W2*(rpad+.06)+sk,y+H2*.12,W2*(DIM.rw-.12),H2*(DIM.rh-.05),W2*.03);dc.fill();

    // Side windows
    dc.fillStyle=car.glass.replace(/[\d.]+\)$/,'.15)');
    _rr(dc,x,y+H2*(DIM.rh*.15+.1),W2*(rpad+.02),H2*(DIM.rh*.65),W2*.02);dc.fill();
    _rr(dc,x+W2*(1-rpad-.02),y+H2*(DIM.rh*.15+.1),W2*(rpad+.02),H2*(DIM.rh*.65),W2*.02);dc.fill();

    // Hood crease
    dc.strokeStyle='rgba(0,0,0,.14)';dc.lineWidth=Math.max(.5,scale*.7);
    dc.beginPath();dc.moveTo(x+W2*.28+sk,y+H2*.12);dc.lineTo(x+W2*.38+sk,y+H2*.04);dc.stroke();
    dc.beginPath();dc.moveTo(x+W2*.72+sk,y+H2*.12);dc.lineTo(x+W2*.62+sk,y+H2*.04);dc.stroke();
    dc.beginPath();dc.moveTo(sx+sk,y+H2*.04);dc.lineTo(sx+sk,y+H2*.12);dc.stroke();

    // Door seam
    dc.strokeStyle='rgba(0,0,0,.16)';
    dc.beginPath();dc.moveTo(sx+sk*.3,y+H2*(DIM.rh+.14));dc.lineTo(sx-sk*.3,y+H2*.84);dc.stroke();

    // Spoiler
    if(t==='super'||t==='stealth'){
      dc.fillStyle=dk(car.body,.25);
      _rr(dc,x+W2*.06-sk*.5,y+H2*.82,W2*.88,H2*.035,W2*.02);dc.fill();
      _rr(dc,x+W2*.08-sk*.5,y+H2*.82,W2*.04,H2*.09,W2*.01);dc.fill();
      _rr(dc,x+W2*.88-sk*.5,y+H2*.82,W2*.04,H2*.09,W2*.01);dc.fill();
    }

    // Side skirts
    dc.fillStyle=dk(car.body,.5);
    _rr(dc,x-sk*.3,y+H2*.76,W2*.16,H2*.11,W2*.02);dc.fill();
    _rr(dc,x+W2*.84-sk*.3,y+H2*.76,W2*.16,H2*.11,W2*.02);dc.fill();

    // Wheels (4)
    const wp=[
      [x+W2*.04, y+H2*.13, W2*.19, H2*.13],
      [x+W2*.77, y+H2*.13, W2*.19, H2*.13],
      [x+W2*.04, y+H2*.65, W2*.19, H2*.13],
      [x+W2*.77, y+H2*.65, W2*.19, H2*.13],
    ];
    wp.forEach(([wx,wy,ww,wh])=>{
      const wcx=wx+ww/2, wcy=wy+wh/2;
      // Tire
      dc.fillStyle='#0c0c0c';
      _rr(dc,wx,wy,ww,wh,ww*.3);dc.fill();
      dc.strokeStyle='#222';dc.lineWidth=Math.max(.5,scale*.6);
      _rr(dc,wx,wy,ww,wh,ww*.3);dc.stroke();
      // Rim
      const rg=dc.createRadialGradient(wcx,wcy,0,wcx,wcy,ww*.42);
      rg.addColorStop(0,'#bbb');rg.addColorStop(.5,'#666');rg.addColorStop(1,'#333');
      dc.fillStyle=rg;
      dc.beginPath();dc.ellipse(wcx,wcy,ww*.42,wh*.42,0,0,Math.PI*2);dc.fill();
      // Spokes
      const spokeN=t==='super'||t==='stealth'?5:t==='sport'?6:t==='muscle'?8:4;
      dc.strokeStyle='#777';dc.lineWidth=Math.max(.6,scale*.9);
      const rot=isPlayer?(Date.now()/320):0;
      for(let s=0;s<spokeN;s++){
        const a=s*(Math.PI*2/spokeN)+rot;
        dc.beginPath();dc.moveTo(wcx,wcy);
        dc.lineTo(wcx+Math.cos(a)*ww*.38,wcy+Math.sin(a)*wh*.38);dc.stroke();
      }
      // Cap
      dc.fillStyle='#aaa';dc.beginPath();dc.ellipse(wcx,wcy,ww*.09,wh*.09,0,0,Math.PI*2);dc.fill();
    });

    // Lights
    if(isPlayer){
      // Headlights
      [[x+W2*.09+sk,y+H2*.02,W2*.2,H2*.05],[x+W2*.71+sk,y+H2*.02,W2*.2,H2*.05]].forEach(([lx,ly,lw,lh])=>{
        dc.shadowColor='#fffde0';dc.shadowBlur=14*scale;
        dc.fillStyle='rgba(255,253,200,.95)';_rr(dc,lx,ly,lw,lh*.4,lh*.15);dc.fill();
        dc.fillStyle='rgba(200,225,255,.7)';_rr(dc,lx,ly+lh*.45,lw,lh*.55,lh*.15);dc.fill();
        dc.shadowBlur=0;
      });
      // Taillights
      [[x+W2*.07-sk*.4,y+H2*.87,W2*.22,H2*.07],[x+W2*.71-sk*.4,y+H2*.87,W2*.22,H2*.07]].forEach(([lx,ly,lw,lh])=>{
        dc.fillStyle='rgba(255,30,30,.9)';_rr(dc,lx,ly,lw,lh,lh*.3);dc.fill();
        dc.fillStyle='rgba(255,130,130,.6)';_rr(dc,lx+lw*.2,ly+lh*.15,lw*.6,lh*.7,lh*.2);dc.fill();
      });
    } else {
      [[x+W2*.07,y+H2*.87,W2*.22,H2*.07],[x+W2*.71,y+H2*.87,W2*.22,H2*.07]].forEach(([lx,ly,lw,lh])=>{
        dc.fillStyle='rgba(255,40,40,.85)';_rr(dc,lx,ly,lw,lh,lh*.3);dc.fill();
      });
      [[x+W2*.09,y+H2*.02,W2*.2,H2*.05],[x+W2*.71,y+H2*.02,W2*.2,H2*.05]].forEach(([lx,ly,lw,lh])=>{
        dc.fillStyle='rgba(255,240,160,.5)';_rr(dc,lx,ly,lw,lh,lh*.2);dc.fill();
      });
    }

    // Body shine
    dc.fillStyle='rgba(255,255,255,.055)';
    dc.beginPath();
    dc.moveTo(x+W2*.28+sk,y+H2*.12);dc.lineTo(x+W2*.72+sk,y+H2*.12);
    dc.lineTo(x+W2*.66+sk*.4,y+H2*.38);dc.lineTo(x+W2*.34+sk*.4,y+H2*.38);
    dc.closePath();dc.fill();

    // NOS flame
    if(active_nos){
      dc.shadowColor=car.ac;dc.shadowBlur=20;
      const fg=dc.createRadialGradient(sx,y+H2,2,sx,y+H2+H2*.3,W2*.4);
      fg.addColorStop(0,'rgba(210,110,255,.9)');
      fg.addColorStop(.4,'rgba(110,0,255,.5)');
      fg.addColorStop(1,'transparent');
      dc.fillStyle=fg;
      dc.beginPath();dc.ellipse(sx,y+H2+H2*.16,W2*.2+Math.random()*W2*.08,H2*.38+Math.random()*H2*.1,0,0,Math.PI*2);dc.fill();
      dc.shadowBlur=0;
    }
  }

  // Helper rr that works on any context
  function _rr(dc,x,y,w,h,r){
    r=Math.max(0,Math.min(r,w/2,h/2));
    dc.beginPath();
    dc.moveTo(x+r,y);dc.lineTo(x+w-r,y);dc.quadraticCurveTo(x+w,y,x+w,y+r);
    dc.lineTo(x+w,y+h-r);dc.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
    dc.lineTo(x+r,y+h);dc.quadraticCurveTo(x,y+h,x,y+h-r);
    dc.lineTo(x,y+r);dc.quadraticCurveTo(x,y,x+r,y);
    dc.closePath();
  }

  // ── CAR SELECT ────────────────────────────────────────────
  function buildSelect(){
    const grid=document.getElementById('cs-grid');
    grid.innerHTML='';
    CARS.forEach(car=>{
      const card=document.createElement('div');
      card.className='cs-card'+(car.id===selectedCar.id?' selected':'');
      card.style.setProperty('--ac',car.ac);

      // Badge
      const badge=document.createElement('div');
      badge.className='cs-badge';
      badge.style.cssText=`background:${car.bc}22;color:${car.bc==='#555'?'#aaa':car.bc};border:1px solid ${car.bc}44`;
      badge.textContent=car.badge;card.appendChild(badge);

      // Preview canvas
      const pv=document.createElement('canvas');
      pv.className='cs-canvas';pv.width=84;pv.height=75;
      card.appendChild(pv);
      setTimeout(()=>{
        const pc=pv.getContext('2d');
        pc.clearRect(0,0,84,75);
        drawCar(pc,42,70,.88,car,false,0,false);
      },0);

      // Name
      const nm=document.createElement('div');nm.className='cs-name';nm.textContent=car.name;card.appendChild(nm);
      const ds=document.createElement('div');ds.className='cs-desc';ds.textContent=car.desc;card.appendChild(ds);

      // Stat bars
      const bars=document.createElement('div');bars.className='cs-bars';
      ['spd','hdl','nos'].forEach(k=>{
        const row=document.createElement('div');row.className='cs-bar-row';
        const lbl=document.createElement('div');lbl.className='cs-bar-lbl';lbl.textContent=k[0].toUpperCase();
        const trk=document.createElement('div');trk.className='cs-bar-track';
        const fil=document.createElement('div');fil.className='cs-bar-fill';
        fil.style.cssText=`width:${car.stats[k]*10}%;background:${car.ac}`;
        trk.appendChild(fil);row.appendChild(lbl);row.appendChild(trk);bars.appendChild(row);
      });
      card.appendChild(bars);

      card.addEventListener('click',()=>{
        selectedCar=car;
        document.querySelectorAll('.cs-card').forEach(c=>c.classList.remove('selected'));
        card.classList.add('selected');
      });
      grid.appendChild(card);
    });
  }

  // ── RENDER ────────────────────────────────────────────────
  function render(){
    ctx.clearRect(0,0,W,H);

    // Sky
    const sk=ctx.createLinearGradient(0,0,0,H*.46);
    sk.addColorStop(0,'#040310');sk.addColorStop(.5,'#0c0820');sk.addColorStop(1,'#18102c');
    ctx.fillStyle=sk;ctx.fillRect(0,0,W,H*.46);

    // Stars
    const now=Date.now();
    ctx.fillStyle='rgba(255,255,255,.5)';
    for(let s=0;s<85;s++){
      const stx=(s*137.5+camZ*.003)%W, sty=(s*89)%(H*.38);
      const ss=.35+Math.abs(Math.sin(s+now*.0007))*.5;
      ctx.beginPath();ctx.arc(stx,sty,ss,0,Math.PI*2);ctx.fill();
    }

    // Skyline
    ctx.fillStyle='#08071a';
    [[0,52,40],[44,75,26],[74,46,30],[108,88,20],[136,60,36],[176,70,24],[208,50,32],[244,80,19],[270,55,26],[300,65,22],[328,46,28],[360,52,26]].forEach(([bx,bh,bw])=>{
      ctx.fillRect(bx,H*.46-bh,bw,bh);
      for(let wy2=H*.46-bh+4;wy2<H*.46-3;wy2+=8)
        for(let wx2=bx+3;wx2<bx+bw-3;wx2+=6)
          if(Math.random()<.45){
            ctx.fillStyle=Math.random()<.25?`rgba(0,229,255,.${8+~~(Math.random()*9)})`:`rgba(255,218,96,.${6+~~(Math.random()*9)})`;
            ctx.fillRect(wx2,wy2,3,4);ctx.fillStyle='#08071a';
          }
      ctx.fillStyle='#08071a';
    });

    // Horizon glow
    const hg=ctx.createLinearGradient(0,H*.3,0,H*.48);
    hg.addColorStop(0,'transparent');
    hg.addColorStop(1,selectedCar.ac+'09');
    ctx.fillStyle=hg;ctx.fillRect(0,H*.3,W,H*.18);

    // ── ROAD PROJECTION ──────────────────────────────────────
    const baseIdx=~~(camZ/SEG)%SEGS;
    const DRAW=160;
    let maxY=H, curveOff=0;
    const strips=[];

    for(let n=0;n<DRAW;n++){
      const idx=(baseIdx+n)%SEGS;
      const seg=road[idx];
      const wz0=(~~(camZ/SEG)+n)*SEG;
      const wz1=wz0+SEG;
      const wy0=seg.y;
      const wy1=road[(idx+1)%SEGS].y;

      const p0=project(wz0,wy0,camZ,camY,camX+curveOff);
      const p1=project(wz1,wy1,camZ,camY,camX+curveOff);
      curveOff+=seg.curve*(spd/Math.max(maxSpd,1))*.4;

      if(!p0||!p1)continue;
      if(p0.sy>=maxY)continue;
      strips.push({p0,p1,seg,idx});
      maxY=p1.sy;
    }

    // Draw back to front
    for(let i=strips.length-1;i>=0;i--){
      const {p0,p1,seg}=strips[i];
      drawStrip(p0.sx,~~p0.sy,~~p0.sw, p1.sx,~~p1.sy,~~p1.sw, seg.alt);

      // Traffic on this seg
      seg.cars.forEach(tc=>{
        const ex=~~(p0.sx + p0.sw*(tc.lx/ROAD_W));
        drawCar(ctx,ex,~~p0.sy,p0.scale*1.05,tc.car,false,0,false);
      });
      // Pickups
      seg.pickups.forEach(pu=>{
        const px2=~~(p0.sx + p0.sw*(pu.lx/ROAD_W));
        drawPickup(px2,~~p0.sy,p0.scale,pu.type);
      });
    }

    // Player car
    const pSX=~~(W/2 + playerX*(W/ROAD_W));
    drawCar(ctx,pSX,H-68,1.18,selectedCar,true,steerAnim,nosOn);

    // Sparks
    drawSparks();

    // Headlight cone
    if(spd>35){
      const ba=Math.min(.09,(spd/maxSpd)*.13);
      ctx.fillStyle=`rgba(255,252,195,${ba})`;
      ctx.beginPath();ctx.moveTo(pSX-16,H-125);ctx.lineTo(pSX-70,H*.44);ctx.lineTo(pSX+70,H*.44);ctx.lineTo(pSX+16,H-125);ctx.closePath();ctx.fill();
    }

    // Motion blur
    if(spd>95){
      const ma=(spd-95)/80*.28;
      ctx.strokeStyle=`rgba(255,255,255,${ma*.1})`;
      for(let i=0;i<12;i++){ctx.lineWidth=.7;ctx.beginPath();const bx=Math.random()*W,by=H*.45+Math.random()*H*.4;ctx.moveTo(bx,by);ctx.lineTo(bx+(-1+Math.random()*2),by+20+Math.random()*35);ctx.stroke();}
    }

    // Flash
    if(flashAlpha>0){ctx.fillStyle=`rgba(255,28,28,${flashAlpha})`;ctx.fillRect(0,0,W,H);}
    if(nosOn){
      ctx.fillStyle='rgba(90,0,180,.05)';ctx.fillRect(0,0,W,H);
      const vg=ctx.createRadialGradient(W/2,H/2,H*.18,W/2,H/2,H*.75);
      vg.addColorStop(0,'transparent');vg.addColorStop(1,'rgba(191,95,255,.09)');
      ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);
    }
  }

  // ── PICKUP DRAW ───────────────────────────────────────────
  function drawPickup(px2,py2,scale,type){
    const r=~~(12*scale);if(r<2)return;
    const pulse=.86+.14*Math.sin(Date.now()/200);
    if(type==='nos'){
      ctx.shadowColor='#bf5fff';ctx.shadowBlur=13*scale;
      ctx.fillStyle='#bf5fff';_rr(ctx,px2-r*.35,py2-r*1.4,r*.7,r*1.4,r*.18);ctx.fill();
      ctx.fillStyle='rgba(255,255,255,.25)';_rr(ctx,px2-r*.35,py2-r*1.4,r*.18,r*1.4,r*.09);ctx.fill();
      ctx.fillStyle='#fff';ctx.font=`bold ${~~(r*.8)}px 'Space Mono'`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('N',px2,py2-r*.7);
    } else if(type==='coin'){
      ctx.shadowColor='#ffd700';ctx.shadowBlur=11*scale*pulse;
      ctx.fillStyle='#ffd700';ctx.beginPath();ctx.arc(px2,py2-r,r*pulse,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='rgba(0,0,0,.35)';ctx.font=`bold ${~~(r*1.05)}px sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('$',px2,py2-r+1);
    } else {
      ctx.shadowColor='#44ff88';ctx.shadowBlur=11*scale;
      ctx.fillStyle='#44ff88';ctx.beginPath();ctx.arc(px2,py2-r,r,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='rgba(0,0,0,.4)';ctx.font=`bold ${~~(r*1.05)}px sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('♥',px2,py2-r+1);
    }
    ctx.shadowBlur=0;
  }

  // ── SPARKS ────────────────────────────────────────────────
  function spawnSparks(x,y,n){
    for(let i=0;i<n;i++){
      const a=Math.random()*Math.PI*2,sp=3+Math.random()*8;
      sparks.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,size:2+Math.random()*3,col:['#ff4444','#ff9500','#ffdd00','#fff','#ffaaaa'][~~(Math.random()*5)]});
    }
  }
  function drawSparks(){
    sparks=sparks.filter(s=>s.life>0);
    sparks.forEach(s=>{
      s.x+=s.vx;s.y+=s.vy;s.vy+=.28;s.vx*=.93;s.life-=.026;
      ctx.globalAlpha=s.life;ctx.shadowColor=s.col;ctx.shadowBlur=5;
      ctx.fillStyle=s.col;ctx.beginPath();ctx.arc(s.x,s.y,s.size*s.life,0,Math.PI*2);ctx.fill();
    });
    ctx.globalAlpha=1;ctx.shadowBlur=0;
  }

  // ── SPAWN ─────────────────────────────────────────────────
  function spawnTraffic(){
    const ahead=~~(camZ/SEG)+130+~~(Math.random()*60);
    const idx=ahead%SEGS;
    if(road[idx].cars.length)return;
    const lane=~~(Math.random()*LANES);
    const lx=-ROAD_W/2+lane*LANE_W+LANE_W/2;
    const ci=~~(Math.random()*CARS.length);
    road[idx].cars.push({lx,car:CARS[ci]});
  }

  function spawnPickupItem(){
    const ahead=~~(camZ/SEG)+80+~~(Math.random()*40);
    const idx=ahead%SEGS;
    if(road[idx].pickups.length)return;
    const lane=~~(Math.random()*LANES);
    const lx=-ROAD_W/2+lane*LANE_W+LANE_W/2;
    const types=['nos','coin','coin','coin','hp'];
    road[idx].pickups.push({lx,type:types[~~(Math.random()*types.length)]});
  }

  // ── COLLISIONS ────────────────────────────────────────────
  function checkCollisions(){
    const base=~~(camZ/SEG);
    for(let d=0;d<=2;d++){
      const idx=(base+d)%SEGS;
      const seg=road[idx];
      seg.cars=seg.cars.filter(tc=>{
        if(Math.abs(tc.lx-playerTargetX)<LANE_W*.46){
          hp--;spawnSparks(W/2,H-90,28);
          spd=Math.max(22,spd*.42);
          if(hp<=0){die();return false;}
          return false;
        }return true;
      });
      seg.pickups=seg.pickups.filter(pu=>{
        if(Math.abs(pu.lx-playerTargetX)<LANE_W*.5){
          if(pu.type==='nos') nos=Math.min(100,nos+38+selectedCar.stats.nos*2);
          else if(pu.type==='coin') score+=120;
          else hp=Math.min(3,hp+1);
          spawnSparks(W/2,H-90,10);
          return false;
        }return true;
      });
    }
  }

  // ── UPDATE ────────────────────────────────────────────────
  function update(ts){
    if(!running||dead)return;
    const dt=Math.min((ts-lastT)/16.67,3);lastT=ts;
    elapsed=(Date.now()-startTime)/1000;

    const nb=nosOn?50+selectedCar.stats.nos*3:0;
    maxSpd=95+selectedCar.stats.spd*10+nb+(level-1)*8;
    spd=Math.min(spd+(2.2+level*.3+selectedCar.stats.spd*.25)*dt, maxSpd);

    if(nosOn){nosTimer-=dt*16;if(nosTimer<=0){nosOn=false;nosTimer=0;}}
    else if(nos<100) nos=Math.min(100,nos+.2*dt);

    gear=Math.min(6,~~(spd/26)+1);

    // Move camera
    camZ+=spd*dt*1.1;
    camY=148+spd*.24;

    // Player X smooth
    playerX+=(playerTargetX-playerX)*(.11+selectedCar.stats.hdl*.007)*dt*4;
    steerAnim+=(Math.sign(playerTargetX-playerX)*Math.min(1,Math.abs(playerTargetX-playerX)/LANE_W)-steerAnim)*.11*dt*4;

    level=~~(elapsed/18)+1;
    score=~~(elapsed*spd*.17);
    if(score>pd.best)pd.best=score;

    if(Math.random()<.02*dt)spawnTraffic();
    if(Math.random()<.013*dt)spawnPickupItem();
    checkCollisions();
    updateHUD();
  }

  // ── DEATH ─────────────────────────────────────────────────
  function die(){
    dead=true;running=false;
    pd.crashes=(pd.crashes||0)+1;pd.runs=(pd.runs||0)+1;
    if(elapsed>pd.btime)pd.btime=~~elapsed;
    spawnSparks(W/2,H-90,40);
    document.getElementById('wrap').classList.add('shake');
    setTimeout(()=>document.getElementById('wrap').classList.remove('shake'),360);
    flashAlpha=.78;let f=0;
    const fl=setInterval(()=>{flashAlpha=f%2?.42:0;f++;if(f>8){clearInterval(fl);flashAlpha=0;showOver();}},64);
    const now=new Date();
    pd.history.unshift({score,level,car:selectedCar.name,speed:~~spd,time:~~elapsed,
      date:now.toLocaleDateString([],{month:'short',day:'numeric'}),ts:now.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})});
    if(pd.history.length>20)pd.history.pop();
    save();
  }

  function showOver(){
    document.getElementById('fin-sc').textContent=score;
    document.getElementById('fin-sp').textContent=~~spd+'km/h';
    document.getElementById('fin-t').textContent=~~elapsed+'s';
    document.getElementById('ov-sr').classList.remove('h');
    document.getElementById('overlay').classList.remove('gone');
    updateHUD();renderHistory();
  }

  // ── HUD ───────────────────────────────────────────────────
  function updateHUD(){
    document.getElementById('hv-spd').innerHTML=~~spd+' <span style="font-size:.5em;opacity:.3">km/h</span>';
    document.getElementById('hv-sc').textContent=score;
    document.getElementById('hv-bs').textContent=pd.best;
    document.getElementById('hv-lv').textContent=level;
    document.getElementById('gear-n').textContent=nosOn?'N':gear;
    for(let i=1;i<=3;i++)document.getElementById('h'+i).className='heart'+(i>hp?' empty':'');
    const rp=Math.min((spd/Math.max(maxSpd,1))*100,100);
    document.getElementById('gf-r').style.width=rp+'%';document.getElementById('gn-r').textContent=~~rp+'%';
    document.getElementById('gf-n').style.width=nos+'%';document.getElementById('gn-n').textContent=~~nos+'%';
    const hpct=(hp/3)*100;
    document.getElementById('gf-h').style.width=hpct+'%';
    document.getElementById('gf-h').style.background=hp<=1?'#ff3c3c':hp<=2?'#ff9500':'#44ff88';
    document.getElementById('gn-h').textContent=hp+'/3';
    document.getElementById('st-cr').textContent=pd.crashes||0;
    document.getElementById('st-bt').textContent=(pd.btime||0)+'s';
    document.getElementById('st-r').textContent=pd.runs||0;
    const nb=document.getElementById('nb');
    nb.classList.toggle('on',nos>=40&&!nosOn);
    nb.textContent=nosOn?'🔥 NOS':'NOS';
  }

  // ── HISTORY ───────────────────────────────────────────────
  function renderHistory(){
    const list=document.getElementById('hl');
    if(!pd.history||!pd.history.length){list.innerHTML='<div class="hemp">No runs yet</div>';return;}
    list.innerHTML='';
    pd.history.forEach(h=>{
      const row=document.createElement('div');row.className='hr';
      row.innerHTML=`<div class="hsc">${h.score}</div><div class="hinfo">${h.car||'?'} · ${h.time}s</div><div class="hlv">LV${h.level}</div><div class="ht">${h.date} ${h.ts}</div>`;
      list.appendChild(row);
    });
  }
  document.getElementById('hclr').addEventListener('click',()=>{pd.history=[];save();renderHistory();});

  // ── LOOP ──────────────────────────────────────────────────
  let raf;
  function startGame(){
    if(raf)cancelAnimationFrame(raf);
    initGame();running=true;dead=false;
    document.getElementById('overlay').classList.add('gone');
    document.getElementById('ov-sr').classList.add('h');
    lastT=performance.now();
    (function loop(ts){update(ts);render();raf=requestAnimationFrame(loop);})(performance.now());
  }

  // ── INPUT ─────────────────────────────────────────────────
  function goL(){if(running&&!dead&&playerLane>0){playerLane--;playerTargetX=laneX(playerLane);}}
  function goR(){if(running&&!dead&&playerLane<LANES-1){playerLane++;playerTargetX=laneX(playerLane);}}
  function nos_fire(){if(running&&!dead&&nos>=40&&!nosOn){nosOn=true;nosTimer=nos*16;nos=0;}}

  document.addEventListener('keydown',e=>{
    if(e.key==='ArrowLeft'||e.key==='a'){e.preventDefault();goL();}
    if(e.key==='ArrowRight'||e.key==='d'){e.preventDefault();goR();}
    if(e.key===' '||e.key==='n'){e.preventDefault();nos_fire();}
  });
  [['bl',goL],['br',goR],['nb',nos_fire]].forEach(([id,fn])=>{
    const b=document.getElementById(id);
    b.addEventListener('touchstart',e=>{e.preventDefault();fn();b.classList.add('p');},{passive:false});
    b.addEventListener('touchend',()=>b.classList.remove('p'),{passive:true});
    b.addEventListener('mousedown',fn);b.addEventListener('mouseup',()=>b.classList.remove('p'));
  });
  let ts0=null;
  c.addEventListener('touchstart',e=>{ts0={x:e.touches[0].clientX};},{passive:true});
  c.addEventListener('touchend',e=>{
    if(!ts0)return;const dx=e.changedTouches[0].clientX-ts0.x;
    if(Math.abs(dx)>22){dx>0?goR():goL();}ts0=null;
  },{passive:true});

  document.getElementById('ov-b').addEventListener('click',startGame);
  document.getElementById('ch-car').addEventListener('click',()=>{
    running=false;if(raf)cancelAnimationFrame(raf);
    document.getElementById('overlay').classList.add('gone');
    document.getElementById('car-select').classList.remove('gone');
    buildSelect();
  });
  document.getElementById('cs-go').addEventListener('click',()=>{
    document.getElementById('car-select').classList.add('gone');
    startGame();
  });

  // ── BOOT ──────────────────────────────────────────────────
  buildSelect();
  updateHUD();renderHistory();
  // Draw static first frame
  camZ=0;camY=150;camX=0;spd=0;maxSpd=160;
  render();
})();
</script>
</body>
</html>
